name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Java 25
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - name: Build Java API, sources, and Javadocs
        run: mvn --batch-mode --no-transfer-progress verify
      - name: Verify source matches VevDB main
        run: |
          curl --fail --location --retry 5 --retry-all-errors \
            --silent --show-error \
            --output Vev-main.java \
            https://raw.githubusercontent.com/vevdb/vev/main/clients/java/src/main/java/com/vevdb/Vev.java
          git diff --no-index --ignore-space-at-eol --exit-code \
            src/main/java/com/vevdb/Vev.java Vev-main.java
